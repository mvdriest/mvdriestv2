name: Cleanup PR Preview

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  cleanup-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove PR preview folder
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          if [ -d "pr-preview/pr-${{ github.event.number }}" ]; then
            git rm -rf "pr-preview/pr-${{ github.event.number }}"
            git commit -m "chore: remove PR preview for #${{ github.event.number }}"
            git push
          else
            echo "No preview folder found for PR #${{ github.event.number }}, skipping cleanup."
          fi
